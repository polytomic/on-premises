{{- if .Values.polytomic.datadog.daemonset.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "polytomic.fullname" . }}-datadog
  labels:
    {{- include "polytomic.labels" . | nindent 4 }}
    app.kubernetes.io/component: datadog
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "polytomic.name" . }}-datadog
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "polytomic.name" . }}-datadog
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "polytomic.fullname" . }}-datadog
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: datadog-agent
        image: {{ .Values.imageRegistry }}/{{ .Values.polytomic.datadog.daemonset.image }}:{{ .Values.polytomic.datadog.daemonset.tag | default .Values.image.tag }}
        imagePullPolicy: {{ .Values.polytomic.datadog.daemonset.imagePullPolicy }}
        ports:
        - containerPort: 8126
          name: apm
          protocol: TCP
        - containerPort: 8125
          name: dogstatsd
          protocol: UDP
        env:
        # Datadog secret backend configuration (uses ptctl from custom image)
        - name: DD_API_KEY
          value: "ENC[DD_API_KEY]"
        - name: DD_SECRET_BACKEND_COMMAND
          value: "/bin/ptctl"
        - name: DD_SECRET_BACKEND_ARGUMENTS
          value: "config get -f vector -"
        # APM configuration
        - name: DD_APM_ENABLED
          value: "true"
        - name: DD_APM_NON_LOCAL_TRAFFIC
          value: "true"
        # Continuous profiling
        - name: DD_PROFILING_ENABLED
          value: "true"
        - name: DD_ENV
          valueFrom:
            secretKeyRef:
              {{- if .Values.secret.name }}
              name: {{ .Values.secret.name }}
              {{- else }}
              name: {{ include "polytomic.fullname" . }}-config
              {{- end }}
              key: DEPLOYMENT
        # Kubernetes node name and hostname (required for hostname detection on EKS)
        - name: DD_KUBERNETES_KUBELET_NODENAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: DD_HOSTNAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        # Kubernetes tagging
        - name: DD_KUBERNETES_POD_LABELS_AS_TAGS
          value: '{"app.kubernetes.io/name": "kube_app", "app.kubernetes.io/component": "kube_component", "polytomic.com/type": "polytomic_type", "polytomic.com/sync-id": "polytomic_sync_id", "polytomic.com/execution-id": "polytomic_execution_id"}'
        # Disable system probe (not needed for APM-only usage)
        - name: DD_SYSTEM_PROBE_ENABLED
          value: "false"
        {{- if .Values.polytomic.datadog.daemonset.containerMetrics.enabled }}
        # Kubelet metrics (CPU, memory)
        - name: DD_KUBELET_TLS_VERIFY
          value: "false"
        - name: DD_KUBERNETES_KUBELET_HOST
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        {{- end }}
        {{- if .Values.polytomic.datadog.daemonset.processAgent.enabled }}
        # Process agent for live container monitoring
        - name: DD_PROCESS_AGENT_ENABLED
          value: "true"
        - name: DD_CONTAINER_COLLECT_ALL
          value: "true"
        {{- end }}
        # Container include/exclude filters
        - name: DD_CONTAINER_INCLUDE
          value: {{ .Values.polytomic.datadog.daemonset.includeContainers | default (printf "kube_namespace:%s" .Release.Namespace) | quote }}
        {{- if .Values.polytomic.datadog.daemonset.excludeContainers }}
        - name: DD_CONTAINER_EXCLUDE
          value: {{ .Values.polytomic.datadog.daemonset.excludeContainers | quote }}
        {{- end }}
        # Required for ptconf secret resolution
        - name: DEPLOYMENT
          valueFrom:
            secretKeyRef:
              {{- if .Values.secret.name }}
              name: {{ .Values.secret.name }}
              {{- else }}
              name: {{ include "polytomic.fullname" . }}-config
              {{- end }}
              key: DEPLOYMENT
        - name: DEPLOYMENT_KEY
          valueFrom:
            secretKeyRef:
              {{- if .Values.secret.name }}
              name: {{ .Values.secret.name }}
              {{- else }}
              name: {{ include "polytomic.fullname" . }}-config
              {{- end }}
              key: DEPLOYMENT_KEY
        {{- if .Values.polytomic.datadog.daemonset.containerMetrics.enabled }}
        volumeMounts:
        - name: cgroups
          mountPath: /host/sys/fs/cgroup
          readOnly: true
        - name: proc
          mountPath: /host/proc
          readOnly: true
        {{- end }}
        resources:
          {{- toYaml .Values.polytomic.datadog.daemonset.resources | nindent 10 }}
      {{- if .Values.polytomic.datadog.daemonset.containerMetrics.enabled }}
      volumes:
      - name: cgroups
        hostPath:
          path: /sys/fs/cgroup
      - name: proc
        hostPath:
          path: /proc
      {{- end }}
      {{- with .Values.polytomic.datadog.daemonset.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.polytomic.datadog.daemonset.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.polytomic.datadog.daemonset.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
