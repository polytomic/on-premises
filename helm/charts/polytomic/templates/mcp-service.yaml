{{- if .Values.mcp.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "polytomic.fullname" . }}-mcp
  labels:
    {{- include "polytomic.labels" . | nindent 4 }}
spec:
  type: {{ .Values.mcp.service.type }}
  ports:
    - port: {{ .Values.mcp.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "polytomic.mcp-selectorLabels" . | nindent 4 }}
{{- end }}
