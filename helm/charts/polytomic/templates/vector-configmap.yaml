    bucket = "${EXECUTION_LOG_BUCKET:?err}"
    key_prefix = "logs/syncs/{{ "{{" }} pt_sync_id {{ "}}" }}/{{ "{{" }} pt_execution_id {{ "}}" }}/log-"
    region = "${AWS_REGION:?err}"
    filename_append_uuid = true
    filename_time_format = "%s"
    filename_extension = "json"
    encoding = { codec = "json", except_fields = ["pt_sync_id", "pt_execution_id", "pt_schema_id"] }
