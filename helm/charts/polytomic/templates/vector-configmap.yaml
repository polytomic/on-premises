{{- if .Values.polytomic.vector.daemonset.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "polytomic.fullname" . }}-vector
  labels:
    {{- include "polytomic.labels" . | nindent 4 }}
    app.kubernetes.io/component: vector
data:
  vector.toml: |
    [secret]
    [secret.dd_secret]
    type = "exec"
    command = [
        "/bin/ptconf",
        "get",
        "-f",
        "vector",
        "-"
    ]

    # Kubernetes logs source - collects from /var/log/pods
    [sources.kubernetes_logs]
    type = "kubernetes_logs"
    # Only collect from Polytomic pods; all pod templates set vector.dev/include=true
    extra_label_selector = "${POD_LABEL_SELECTOR:-vector.dev/include=true}"
    self_node_name = "${VECTOR_SELF_NODE_NAME}"
    # Read from /var/log/pods
    glob_minimum_cooldown_ms = 1000
    # Exclude Vector's own logs to prevent recursive collection loop
    exclude_paths_glob_patterns = ["/var/log/pods/*_{{ include "polytomic.fullname" . }}-vector-*_*/**"]

    # Parse JSON logs
    [transforms.parse]
    type = "remap"
    inputs = [ "kubernetes_logs" ]
    source = ". |= object!(parse_json!(.message))"

    # === Record log routing ============================================
    # The polytomic app emits per-record audit lines via
    # services/polytomic/recordlogs/RedisLoggingReporter. Each line carries
    # `record_log = "true"` and `type = "record"|"insert"|"update"|"delete"|"error"|"warning"`.
    # The CSV exporter reads from record_logs/<sync>/<exec>/<type>/ so this
    # block must split by type and write to that prefix or exports hang.

    [transforms.record_logs]
    type = "filter"
    inputs = [ "parse" ]
    condition = 'exists(.record_log)'

    [transforms.record_log_records]
    type = "filter"
    inputs = ["record_logs"]
    condition = '(.type == "record")'

    [transforms.record_log_records_minified]
    type = "remap"
    inputs = ["record_log_records"]
    source = """
    pt_sync_id = .sync_id
    pt_execution_id = .execution_id
    . = .record
    .pt_sync_id = pt_sync_id
    .pt_execution_id = pt_execution_id
    """

    [transforms.record_log_inserts]
    type = "filter"
    inputs = ["record_logs"]
    condition = '(.type == "insert")'

    [transforms.record_log_inserts_minified]
    type = "remap"
    inputs = ["record_log_inserts"]
    source = """
    pt_sync_id = .sync_id
    pt_execution_id = .execution_id
    . = .record
    .pt_sync_id = pt_sync_id
    .pt_execution_id = pt_execution_id
    """

    [transforms.record_log_updates]
    type = "filter"
    inputs = ["record_logs"]
    condition = '(.type == "update")'

    [transforms.record_log_updates_minified]
    type = "remap"
    inputs = ["record_log_updates"]
    source = """
    pt_sync_id = .sync_id
    pt_execution_id = .execution_id
    . = .record
    .pt_sync_id = pt_sync_id
    .pt_execution_id = pt_execution_id
    """

    [transforms.record_log_deletes]
    type = "filter"
    inputs = ["record_logs"]
    condition = '(.type == "delete")'

    [transforms.record_log_deletes_minified]
    type = "remap"
    inputs = ["record_log_deletes"]
    source = """
    pt_sync_id = .sync_id
    pt_execution_id = .execution_id
    . = .record
    .pt_sync_id = pt_sync_id
    .pt_execution_id = pt_execution_id
    """

    [transforms.record_log_errors]
    type = "filter"
    inputs = ["record_logs"]
    condition = '(.type == "error")'

    [transforms.record_log_errors_minified]
    type = "remap"
    inputs = ["record_log_errors"]
    source = """
    pt_sync_id = .sync_id
    pt_execution_id = .execution_id
    . = .record
    .pt_sync_id = pt_sync_id
    .pt_execution_id = pt_execution_id
    """

    [transforms.record_log_warnings]
    type = "filter"
    inputs = ["record_logs"]
    condition = '(.type == "warning")'

    [transforms.record_log_warnings_minified]
    type = "remap"
    inputs = ["record_log_warnings"]
    source = """
    pt_sync_id = .sync_id
    pt_execution_id = .execution_id
    . = .record
    .pt_sync_id = pt_sync_id
    .pt_execution_id = pt_execution_id
    """

    # === Execution log routing =========================================
    # services/polytomic/applog/VectorBlobLogger emits `app_logger = true`
    # on every line. Lines without a schema_id are sync-level execution
    # logs; lines with one are schema execution logs.

    [transforms.execution_logs]
    type = "filter"
    inputs = [ "parse" ]
    condition = 'exists(.app_logger) && !exists(.schema_id)'

    [transforms.execution_log_minified]
    type = "remap"
    inputs = ["execution_logs"]
    source = """
    pt_sync_id = .sync_id
    pt_execution_id = .execution_id
    . = .payload
    .pt_sync_id = pt_sync_id
    .pt_execution_id = pt_execution_id
    """

    [transforms.schema_execution_logs]
    type = "filter"
    inputs = [ "parse" ]
    condition = 'exists(.app_logger) && exists(.schema_id)'

    [transforms.schema_execution_logs_minified]
    type = "remap"
    inputs = ["schema_execution_logs"]
    source = """
    pt_sync_id = .sync_id
    pt_execution_id = .execution_id
    pt_schema_id = .schema_id
    . = .payload
    .pt_sync_id = pt_sync_id
    .pt_execution_id = pt_execution_id
    .pt_schema_id = pt_schema_id
    """

    # === Audit log routing =============================================

    [transforms.ingest_audit_logs]
    type = "filter"
    inputs = [ "parse" ]
    condition = 'exists(.audit) && (.audit == "ingest_changes" || .audit == "change_stored")'

    [transforms.ingest_audit_logs_hoist]
    type = "remap"
    inputs = ["ingest_audit_logs"]
    source = """
    pt_audit = .audit
    pt_sync_id = .sync_id
    pt_schema_id = .schema_id
    pt_connection_id = .connection_id
    . = .payload
    .pt_audit = pt_audit
    .pt_sync_id = pt_sync_id
    .pt_schema_id = pt_schema_id
    .pt_connection_id = pt_connection_id
    """

    [transforms.proxy_audit_logs]
    type = "filter"
    inputs = [ "parse" ]
    condition = 'exists(.audit) && .audit == "connection_proxy_call"'

    [transforms.proxy_audit_logs_hoist]
    type = "remap"
    inputs = ["proxy_audit_logs"]
    source = """
    pt_audit = .audit
    pt_connection_id = .connection_id
    . = .payload
    .pt_audit = pt_audit
    .pt_connection_id = pt_connection_id
    """

    # === Legacy combined execution_logs filter ==========================
    # Preserved for backwards compatibility with readers that depend on
    # {org_id}/execution_logs/{sync_id}/{execution_id}/... objects.
    # Slated for removal once those readers are retired.

    [transforms.filter]
    type = "filter"
    inputs = [ "parse" ]
    condition = 'exists(.execution_id) && exists(.organization_id) && exists(.sync_id)'

{{- if .Values.polytomic.s3.gcs }}
    # === GCS sinks =====================================================

    [sinks.record_log_records_gcs]
    type = "gcp_cloud_storage"
    inputs = ["record_log_records_minified"]
    bucket = "${EXECUTION_LOG_BUCKET:?err}"
    key_prefix = "record_logs/{{ "{{" }} pt_sync_id {{ "}}" }}/{{ "{{" }} pt_execution_id {{ "}}" }}/records/log"
    filename_append_uuid = true
    filename_time_format = "%s"
    filename_extension = "json"
    [sinks.record_log_records_gcs.encoding]
    codec = "json"
    except_fields = ["pt_sync_id", "pt_execution_id"]
    [sinks.record_log_records_gcs.batch]
    timeout_secs = 10

    [sinks.record_log_inserts_gcs]
    type = "gcp_cloud_storage"
    inputs = ["record_log_inserts_minified"]
    bucket = "${EXECUTION_LOG_BUCKET:?err}"
    key_prefix = "record_logs/{{ "{{" }} pt_sync_id {{ "}}" }}/{{ "{{" }} pt_execution_id {{ "}}" }}/inserts/log"
    filename_append_uuid = true
    filename_time_format = "%s"
    filename_extension = "json"
    [sinks.record_log_inserts_gcs.encoding]
    codec = "json"
    except_fields = ["pt_sync_id", "pt_execution_id"]
    [sinks.record_log_inserts_gcs.batch]
    timeout_secs = 10

    [sinks.record_log_updates_gcs]
    type = "gcp_cloud_storage"
    inputs = ["record_log_updates_minified"]
    bucket = "${EXECUTION_LOG_BUCKET:?err}"
    key_prefix = "record_logs/{{ "{{" }} pt_sync_id {{ "}}" }}/{{ "{{" }} pt_execution_id {{ "}}" }}/updates/log"
    filename_append_uuid = true
    filename_time_format = "%s"
    filename_extension = "json"
    [sinks.record_log_updates_gcs.encoding]
