    region = "${AWS_REGION:?err}"
    filename_append_uuid = true
    filename_time_format = "%s"
    filename_extension = "json"
    encoding = { codec = "json", except_fields = ["pt_audit", "pt_sync_id", "pt_schema_id", "pt_connection_id"] }
    batch = { timeout_secs = 10 }

    [sinks.proxy_audit_logs_s3]
    type = "aws_s3"
    inputs = ["proxy_audit_logs_hoist"]
