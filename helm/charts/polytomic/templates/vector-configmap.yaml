    key_prefix = "record_logs/{{ "{{" }} pt_sync_id {{ "}}" }}/{{ "{{" }} pt_execution_id {{ "}}" }}/deletes/log"
    filename_append_uuid = true
    filename_time_format = "%s"
    filename_extension = "json"
    [sinks.record_log_deletes_gcs.encoding]
    codec = "json"
    except_fields = ["pt_sync_id", "pt_execution_id"]
    [sinks.record_log_deletes_gcs.batch]
