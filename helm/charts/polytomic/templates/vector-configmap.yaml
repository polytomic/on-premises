    bucket = "${EXECUTION_LOG_BUCKET:?err}"
    key_prefix = "record_logs/{{ "{{" }} pt_sync_id {{ "}}" }}/{{ "{{" }} pt_execution_id {{ "}}" }}/errors/log"
    filename_append_uuid = true
    filename_time_format = "%s"
    filename_extension = "json"
    [sinks.record_log_errors_gcs.encoding]
    codec = "json"
    except_fields = ["pt_sync_id", "pt_execution_id"]
    [sinks.record_log_errors_gcs.batch]
    timeout_secs = 10

    [sinks.record_log_warnings_gcs]
    type = "gcp_cloud_storage"
    inputs = ["record_log_warnings_minified"]
    bucket = "${EXECUTION_LOG_BUCKET:?err}"
    key_prefix = "record_logs/{{ "{{" }} pt_sync_id {{ "}}" }}/{{ "{{" }} pt_execution_id {{ "}}" }}/warnings/log"
    filename_append_uuid = true
    filename_time_format = "%s"
    filename_extension = "json"
    [sinks.record_log_warnings_gcs.encoding]
    codec = "json"
    except_fields = ["pt_sync_id", "pt_execution_id"]
    [sinks.record_log_warnings_gcs.batch]
    timeout_secs = 10

    [sinks.execution_logs_gcs]
    type = "gcp_cloud_storage"
    inputs = ["execution_log_minified"]
    bucket = "${EXECUTION_LOG_BUCKET:?err}"
    key_prefix = "logs/syncs/{{ "{{" }} pt_sync_id {{ "}}" }}/{{ "{{" }} pt_execution_id {{ "}}" }}/log-"
    filename_append_uuid = true
    filename_time_format = "%s"
    filename_extension = "json"
    encoding = { codec = "json", except_fields = ["pt_sync_id", "pt_execution_id", "pt_schema_id"] }
    batch = { timeout_secs = 10 }

    [sinks.schema_execution_logs_gcs]
    type = "gcp_cloud_storage"
    inputs = ["schema_execution_logs_minified"]
    bucket = "${EXECUTION_LOG_BUCKET:?err}"
    key_prefix = "logs/syncs/{{ "{{" }} pt_sync_id {{ "}}" }}/{{ "{{" }} pt_execution_id {{ "}}" }}/schemas/{{ "{{" }} pt_schema_id {{ "}}" }}/log-"
    filename_append_uuid = true
    filename_time_format = "%s"
    filename_extension = "json"
    encoding = { codec = "json", except_fields = ["pt_sync_id", "pt_execution_id", "pt_schema_id"] }
    batch = { timeout_secs = 10 }

    [sinks.ingest_audit_logs_gcs]
    type = "gcp_cloud_storage"
    inputs = ["ingest_audit_logs_hoist"]
    bucket = "${EXECUTION_LOG_BUCKET:?err}"
    key_prefix = "logs/audit/{{ "{{" }} pt_audit {{ "}}" }}/{{ "{{" }} pt_connection_id {{ "}}" }}/{{ "{{" }} pt_sync_id {{ "}}" }}/{{ "{{" }} pt_schema_id {{ "}}" }}/year=%Y/month=%m/day=%d/"
    filename_append_uuid = true
    filename_time_format = "%s"
    filename_extension = "json"
    encoding = { codec = "json", except_fields = ["pt_audit", "pt_sync_id", "pt_schema_id", "pt_connection_id"] }
    batch = { timeout_secs = 10 }

    [sinks.proxy_audit_logs_gcs]
    type = "gcp_cloud_storage"
    inputs = ["proxy_audit_logs_hoist"]
    bucket = "${EXECUTION_LOG_BUCKET:?err}"
    key_prefix = "logs/audit/{{ "{{" }} pt_audit {{ "}}" }}/{{ "{{" }} pt_connection_id {{ "}}" }}/year=%Y/month=%m/day=%d/"
    filename_append_uuid = true
    filename_time_format = "%s"
    filename_extension = "json"
    encoding = { codec = "json", except_fields = ["pt_audit", "pt_connection_id"] }
    batch = { timeout_secs = 10 }

    # Legacy combined sink
    [sinks.gcs]
    type = "gcp_cloud_storage"
    inputs = [ "filter" ]
    bucket =  "${EXECUTION_LOG_BUCKET:?err}"
    key_prefix = "{{ "{{" }} organization_id  {{ "}}" }}/execution_logs/{{ "{{" }} sync_id {{ "}}" }}/{{ "{{" }} execution_id {{ "}}" }}"
    filename_append_uuid = true
    filename_time_format = "%s"
    filename_extension = "json"
    [sinks.gcs.encoding]
    codec = "json"
    [sinks.gcs.batch]
    timeout_secs = 10
{{- else }}
    # === S3 sinks ======================================================

    [sinks.record_log_records_s3]
    type = "aws_s3"
    inputs = ["record_log_records_minified"]
    bucket = "${EXECUTION_LOG_BUCKET:?err}"
    key_prefix = "record_logs/{{ "{{" }} pt_sync_id {{ "}}" }}/{{ "{{" }} pt_execution_id {{ "}}" }}/records/log"
    region = "${AWS_REGION:?err}"
    filename_append_uuid = true
    filename_time_format = "%s"
    filename_extension = "json"
    [sinks.record_log_records_s3.encoding]
    codec = "json"
    except_fields = ["pt_sync_id", "pt_execution_id"]
    [sinks.record_log_records_s3.batch]
    timeout_secs = 10

    [sinks.record_log_inserts_s3]
    type = "aws_s3"
    inputs = ["record_log_inserts_minified"]
    bucket = "${EXECUTION_LOG_BUCKET:?err}"
    key_prefix = "record_logs/{{ "{{" }} pt_sync_id {{ "}}" }}/{{ "{{" }} pt_execution_id {{ "}}" }}/inserts/log"
    region = "${AWS_REGION:?err}"
    filename_append_uuid = true
    filename_time_format = "%s"
    filename_extension = "json"
    [sinks.record_log_inserts_s3.encoding]
    codec = "json"
    except_fields = ["pt_sync_id", "pt_execution_id"]
    [sinks.record_log_inserts_s3.batch]
    timeout_secs = 10

    [sinks.record_log_updates_s3]
    type = "aws_s3"
    inputs = ["record_log_updates_minified"]
    bucket = "${EXECUTION_LOG_BUCKET:?err}"
    key_prefix = "record_logs/{{ "{{" }} pt_sync_id {{ "}}" }}/{{ "{{" }} pt_execution_id {{ "}}" }}/updates/log"
    region = "${AWS_REGION:?err}"
    filename_append_uuid = true
    filename_time_format = "%s"
    filename_extension = "json"
    [sinks.record_log_updates_s3.encoding]
    codec = "json"
    except_fields = ["pt_sync_id", "pt_execution_id"]
    [sinks.record_log_updates_s3.batch]
    timeout_secs = 10

    [sinks.record_log_deletes_s3]
    type = "aws_s3"
    inputs = ["record_log_deletes_minified"]
    bucket = "${EXECUTION_LOG_BUCKET:?err}"
    key_prefix = "record_logs/{{ "{{" }} pt_sync_id {{ "}}" }}/{{ "{{" }} pt_execution_id {{ "}}" }}/deletes/log"
    region = "${AWS_REGION:?err}"
    filename_append_uuid = true
    filename_time_format = "%s"
    filename_extension = "json"
    [sinks.record_log_deletes_s3.encoding]
    codec = "json"
    except_fields = ["pt_sync_id", "pt_execution_id"]
    [sinks.record_log_deletes_s3.batch]
    timeout_secs = 10

    [sinks.record_log_errors_s3]
    type = "aws_s3"
    inputs = ["record_log_errors_minified"]
    bucket = "${EXECUTION_LOG_BUCKET:?err}"
    key_prefix = "record_logs/{{ "{{" }} pt_sync_id {{ "}}" }}/{{ "{{" }} pt_execution_id {{ "}}" }}/errors/log"
    region = "${AWS_REGION:?err}"
    filename_append_uuid = true
    filename_time_format = "%s"
    filename_extension = "json"
    [sinks.record_log_errors_s3.encoding]
    codec = "json"
    except_fields = ["pt_sync_id", "pt_execution_id"]
    [sinks.record_log_errors_s3.batch]
    timeout_secs = 10

    [sinks.record_log_warnings_s3]
    type = "aws_s3"
    inputs = ["record_log_warnings_minified"]
    bucket = "${EXECUTION_LOG_BUCKET:?err}"
    key_prefix = "record_logs/{{ "{{" }} pt_sync_id {{ "}}" }}/{{ "{{" }} pt_execution_id {{ "}}" }}/warnings/log"
    region = "${AWS_REGION:?err}"
    filename_append_uuid = true
    filename_time_format = "%s"
    filename_extension = "json"
    [sinks.record_log_warnings_s3.encoding]
    codec = "json"
