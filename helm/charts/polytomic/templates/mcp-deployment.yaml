{{- if .Values.mcp.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "polytomic.fullname" . }}-mcp
  labels:
    {{- include "polytomic.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.mcp.replicaCount }}
  selector:
    matchLabels:
      {{- include "polytomic.mcp-selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.mcp.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "polytomic.mcp-selectorLabels" . | nindent 8 }}
        vector.dev/include: "true"
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "polytomic.serviceAccountName" . }}
      {{- with .Values.mcp.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: mcp
          {{- with .Values.mcp.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: {{ include "polytomic.mcp-image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
          - name: POLYTOMIC_BASE_URL
            value: "http://{{ include "polytomic.fullname" . }}:{{ .Values.service.port }}"
          - name: POLYTOMIC_API_VERSION
            value: {{ .Values.mcp.apiVersion | quote }}
          - name: POLYTOMIC_HTTP_HOST
            value: "0.0.0.0"
          - name: POLYTOMIC_HTTP_PORT
            value: {{ .Values.mcp.port | quote }}
          ports:
          - name: http
            containerPort: {{ .Values.mcp.port }}
            protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.mcp.resources | nindent 12 }}
      {{- with .Values.mcp.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mcp.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mcp.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
