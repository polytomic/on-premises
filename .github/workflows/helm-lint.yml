name: Helm Lint
on:
  pull_request:
    paths:
      - 'helm/**'
jobs:
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v4
      - name: Add dependency repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add nfs-ganesha https://kubernetes-sigs.github.io/nfs-ganesha-server-and-external-provisioner/
          helm repo update
      - name: Build dependencies
        run: helm dependency build helm/charts/polytomic
      - name: Lint chart
        run: helm lint helm/charts/polytomic -f helm/charts/polytomic/ci/ci-values.yaml
